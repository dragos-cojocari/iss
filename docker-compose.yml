services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: bork-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bork_db}
      POSTGRES_USER: ${POSTGRES_USER:-bork_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bork_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bork_user -d bork_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bork-network
    # Security settings
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bork-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-bork_db}
      POSTGRES_USER: ${POSTGRES_USER:-bork_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bork_password}
      BACKEND_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bork-network
    # Security settings
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Temporary filesystem for /tmp (required by Spring Boot)
    tmpfs:
      - /tmp:size=200M,mode=1777
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped

  # Go TUI Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bork-frontend
    environment:
      BORK_BACKEND_URL: http://backend:8080
      TERM: xterm-256color
    stdin_open: true
    tty: true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bork-network
    # Security settings
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  bork-network:
    driver: bridge
